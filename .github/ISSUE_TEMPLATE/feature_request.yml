name: ✨ Feature request
description: Suggest an enhancement or new feature.
title: "[FEATURE] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your suggestion! Please give us enough context to understand the need.

  - id: summary
    type: input
    attributes:
      label: Brief summary
      placeholder: e.g. "Allow users to set their phone number from profile settings"
    validations:
      required: true

  - id: motivation
    type: textarea
    attributes:
      label: Motivation
      description: Why is this feature important? What problem does it solve?
    validations:
      required: true

  - id: acceptance
    type: textarea
    attributes:
      label: Acceptance criteria
      description: Specific, testable conditions that define "done".
      placeholder: |
        - [ ] User can navigate to /profile and update their phone number
        - [ ] Phone number is validated before saving
    validations:
      required: true

  - id: design
    type: textarea
    attributes:
      label: Proposed design
      description: How would you implement this? Which files are likely to change?

  - id: out_of_scope
    type: textarea
    attributes:
      label: Out of scope
      description: Anything that should NOT be included in this feature's PR.
